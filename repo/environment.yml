name: operator-regime-hcc
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.12
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - tqdm>=4.65
  - joblib>=1.3
  - networkx>=3.1

  # Bioinformatics
  - scanpy>=1.9.6
  - anndata>=0.10

  # Image processing (for IMC)
  - tifffile>=2023.7
  - scikit-image>=0.21

  # pip-only packages
  - pip:
    - gudhi>=3.9.0
    - GEOparse>=2.0.4
